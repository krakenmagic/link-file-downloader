<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 260px; margin: 0; font: 13px/1.5 system-ui, sans-serif; color: #1a1a1a; }
  .hd { padding: 12px 14px 6px; font-size: 14px; font-weight: 700; }
  .sub { padding: 0 14px 10px; color: #777; font-size: 11px; }
  .btns { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 8px; }
  button { font: inherit; cursor: pointer; border: none; border-radius: 8px; padding: 11px;
    font-weight: 600; background: #1f6feb; color: #fff; text-align: left; }
  button:hover { background: #1a5fd0; }
  button.ghost { background: #eef2ff; color: #1f6feb; }
  button.ghost:hover { background: #e0e8ff; }
  button .d { display: block; font-weight: 400; font-size: 11px; opacity: .85; }
  .note { padding: 0 14px 12px; color: #999; font-size: 10.5px; }
</style>
</head>
<body>
  <div class="hd" id="t-hd"></div>
  <div class="sub" id="t-sub"></div>
  <div class="btns">
    <button id="selection"><span id="t-sel-title"></span>
      <span class="d" id="t-sel-desc"></span>
    </button>
    <button id="picker"><span id="t-pick-title"></span>
      <span class="d" id="t-pick-desc"></span>
    </button>
    <button id="help" class="ghost"><span id="t-help-title"></span>
      <span class="d" id="t-help-desc"></span>
    </button>
  </div>
  <div class="note" id="t-note"></div>
  <script src="popup.js"></script>
</body>
</html>
